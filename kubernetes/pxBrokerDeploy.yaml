---
# ServiceAccount used by the broker pod so it can call the Kubernetes API
# to auto-discover Portworx pod IPs for metrics scraping.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pxbroker-sa
---
# ClusterRole that allows the broker to list/get pods across namespaces.
# This is required for auto-discovery of Portworx pod IPs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pxbroker-pod-reader
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pxbroker-pod-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pxbroker-pod-reader
subjects:
- kind: ServiceAccount
  name: pxbroker-sa
  namespace: portworx-client
---
apiVersion: v1
kind: Service
metadata:
  name: pxbroker-service
  labels:
    app: pxbroker
spec:
  selector:
    app: pxbroker
  ports:
  - port: 80
    targetPort: 8081
---
apiVersion: v1
kind: Secret
metadata:
  name: portworx-token
type: Opaque
data:
  token: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pxbroker-deployment
  labels:
    app: pxbroker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pxbroker
  template:
    metadata:
      labels:
        app: pxbroker
    spec:
      serviceAccountName: pxbroker-sa
      containers:
      - name: pxbroker
        image: calvarado2004/portworx-client-broker:latest
        resources:
          requests:
            cpu: 10m
            memory: 10Mi
          limits:
            cpu: 100m
            memory: 100Mi
        env:
        - name: "PORTWORX_GRPC_URL"
          value: "portworx-service.kube-system:9020"
        - name: "KEYCLOAK_URL"
          valueFrom:
            secretKeyRef:
              name: keycloak
              key: keycloakUrl
        - name: "KEYCLOAK_CLIENT_ID"
          valueFrom:
            secretKeyRef:
              name: keycloak
              key: keycloakClientID
        - name: "KEYCLOAK_SECRET"
          valueFrom:
            secretKeyRef:
              name: keycloak
              key: keycloakSecret
        - name: "KEYCLOAK_REALM"
          valueFrom:
            secretKeyRef:
              name: keycloak
              key: keycloakRealm
        - name: "PORTWORX_TOKEN"
          valueFrom:
            secretKeyRef:
              name: portworx-token
              key: token
        # Portworx pod auto-discovery settings.
        # The broker queries the K8s API to find all running Portworx pods
        # and fans out metrics requests to each node concurrently.
        - name: "PORTWORX_NAMESPACE"
          value: "kube-system"
        - name: "PORTWORX_METRICS_PORT"
          value: "9001"
        - name: "PORTWORX_LABEL_SELECTOR"
          value: "name=portworx"
        ports:
        - containerPort: 8081
        livenessProbe:
          exec:
            command:
              - sh
              - -ec
              - 'wget --no-verbose --tries=1 --spider http://127.0.0.1:8081/ping || exit 1'
          initialDelaySeconds: 7
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 6
        readinessProbe:
          exec:
            command:
              - sh
              - -ec
              - 'wget --no-verbose --tries=1 --spider http://127.0.0.1:8081/ping || exit 1'
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 6
