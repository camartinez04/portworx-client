apiVersion: v1
kind: ServiceAccount
metadata:
  name: pxbroker-sa
  namespace: px-client
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pxbroker-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pxbroker-pod-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pxbroker-pod-reader
subjects:
  - kind: ServiceAccount
    name: pxbroker-sa
    namespace: px-client
---
# Grants pxbroker-sa read access to the OpenShift Thanos Querier API
# (https://thanos-querier.openshift-monitoring.svc.cluster.local:9091).
# The cluster-monitoring-view ClusterRole is the standard OpenShift role
# for this purpose (same role used by Grafana datasource SAs).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pxbroker-monitoring-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: pxbroker-sa
    namespace: px-client
---
# Long-lived service account token for pxbroker-sa, used as the Bearer token
# when the broker queries the Thanos Querier. Set via PORTWORX_METRICS_TOKEN.
apiVersion: v1
kind: Secret
metadata:
  name: pxbroker-metrics-token
  namespace: px-client
  annotations:
    kubernetes.io/service-account.name: pxbroker-sa
type: kubernetes.io/service-account-token
---
apiVersion: v1
kind: Service
metadata:
  name: pxbroker-service
  namespace: px-client
  labels:
    app: pxbroker
spec:
  selector:
    app: pxbroker
  ports:
    - port: 8081
      targetPort: 8081
---
apiVersion: v1
kind: Secret
metadata:
  name: portworx-token
  namespace: px-client
type: Opaque
data:
  token: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broker
  namespace: px-client
  labels:
    app: pxbroker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pxbroker
  template:
    metadata:
      labels:
        app: pxbroker
    spec:
      serviceAccountName: pxbroker-sa
      containers:
        - name: pxbroker
          image: calvarado2004/portworx-client-broker:latest
          resources:
            requests:
              cpu: 10m
              memory: 10Mi
            limits:
              cpu: 100m
              memory: 100Mi
          env:
            - name: "PORTWORX_NAMESPACE"
              value: "portworx"
            - name: "PORTWORX_GRPC_URL"
              value: "portworx-service.kube-system:9020"
            - name: "KEYCLOAK_URL"
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: keycloakUrl
            - name: "KEYCLOAK_CLIENT_ID"
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: keycloakClientID
            - name: "KEYCLOAK_SECRET"
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: keycloakSecret
            - name: "KEYCLOAK_REALM"
              valueFrom:
                secretKeyRef:
                  name: keycloak
                  key: keycloakRealm
            - name: "PORTWORX_TOKEN"
              valueFrom:
                secretKeyRef:
                  name: portworx-token
                  key: token
            - name: "PORTWORX_METRICS_URL"
              value: "https://thanos-querier.openshift-monitoring.svc.cluster.local:9091"
            - name: "PORTWORX_METRICS_TOKEN"
              valueFrom:
                secretKeyRef:
                  name: pxbroker-metrics-token
                  key: token
          ports:
            - containerPort: 8081
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - 'wget --no-verbose --tries=1 --spider http://127.0.0.1:8081/ping || exit 1'
            initialDelaySeconds: 7
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - 'wget --no-verbose --tries=1 --spider http://127.0.0.1:8081/ping || exit 1'
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
