apiVersion: apps.openshift.io/v1
kind: DeploymentConfig
metadata:
  name: broker-deploymentconfig
  namespace: px-client
spec:
  selector:
    app: pxbroker
  replicas: 1
  template:
    metadata:
      labels:
        app: pxbroker
    spec:
      serviceAccountName: pxbroker-sa
      containers:
        - name: pxbroker
          image: >-
            image-registry.openshift-image-registry.svc:5000/portworx-client/portworx-client-broker:latest
          resources:
            requests:
              cpu: 10m
              memory: 10Mi
            limits:
              cpu: 100m
              memory: 100Mi
          env:
          - name: "PORTWORX_GRPC_URL"
            value: "portworx-service.kube-system:9020"
          - name: "KEYCLOAK_URL"
            valueFrom:
              secretKeyRef:
                name: keycloak
                key: keycloakUrl
          - name: "KEYCLOAK_CLIENT_ID"
            valueFrom:
              secretKeyRef:
                name: keycloak
                key: keycloakClientID
          - name: "KEYCLOAK_SECRET"
            valueFrom:
              secretKeyRef:
                name: keycloak
                key: keycloakSecret
          - name: "KEYCLOAK_REALM"
            valueFrom:
              secretKeyRef:
                name: keycloak
                key: keycloakRealm
          - name: "PORTWORX_TOKEN"
            valueFrom:
              secretKeyRef:
                name: portworx-token
                key: token
          - name: "PORTWORX_METRICS_URL"
            value: ""
          - name: "PORTWORX_NAMESPACE"
            value: "portworx"
          - name: "PORTWORX_METRICS_PORT"
            value: "17001"
          - name: "PORTWORX_LABEL_SELECTOR"
            value: "name=portworx"
          ports:
          - containerPort: 8081
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - 'wget --no-verbose --tries=1 --spider http://127.0.0.1:8081/ping || exit 1'
            initialDelaySeconds: 7
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - 'wget --no-verbose --tries=1 --spider http://127.0.0.1:8081/ping || exit 1'
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: pxbroker-service
  labels:
    app: pxbroker
spec:
  selector:
    app: pxbroker
  ports:
  - port: 8081
    targetPort: 8081
---
apiVersion: v1
kind: Secret
metadata:
  name: portworx-token
type: Opaque
data:
  token: ""
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pxbroker-sa
  namespace: px-client
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pxbroker-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pxbroker-pod-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pxbroker-pod-reader
subjects:
  - kind: ServiceAccount
    name: pxbroker-sa
    namespace: px-client